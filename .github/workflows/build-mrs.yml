name: build-mrs

on:
  workflow_dispatch:

  # 北京时间每天 06:00 自动运行
  schedule:
    - cron: "0 6 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: build-mrs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python requirements
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Download mihomo
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p bin

          python - <<'PY'
          import json
          import urllib.request

          api = "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest"

          with urllib.request.urlopen(api) as r:
              data = json.load(r)

          assets = data.get("assets", [])

          candidates = []

          for asset in assets:
              name = asset.get("name", "")
              url = asset.get("browser_download_url", "")

              if (
                  "linux-amd64" in name
                  and name.endswith(".gz")
                  and "alpha" not in name.lower()
              ):
                  candidates.append((name, url))

          if not candidates:
              raise SystemExit("没有找到 mihomo linux-amd64 .gz 下载文件")

          # 优先 compatible，兼容性最好
          candidates.sort(key=lambda x: ("compatible" not in x[0], x[0]))

          name, url = candidates[0]

          print(f"使用 mihomo: {name}")

          with open("mihomo_asset_url.txt", "w", encoding="utf-8") as f:
              f.write(url)
          PY

          MIHOMO_URL="$(cat mihomo_asset_url.txt)"

          curl -fsSL "$MIHOMO_URL" -o mihomo.gz
          gzip -dc mihomo.gz > bin/mihomo
          chmod +x bin/mihomo

          ./bin/mihomo -v

      - name: Build MRS and TXT rules
        shell: bash
        env:
          MIHOMO_BIN: ./bin/mihomo
        run: |
          set -euo pipefail

          python scripts/build_rules.py

          # 不允许 manifest.json 进入 rule/mihomo
          rm -f rule/mihomo/manifest.json

      - name: Commit and push rule changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 如果旧版本已经提交过 manifest.json，这里自动从 Git 跟踪中删除
          git rm --ignore-unmatch rule/mihomo/manifest.json || true
          rm -f rule/mihomo/manifest.json

          # 只提交 .mrs 和 .txt
          find rule/mihomo -maxdepth 1 \( -name "*.mrs" -o -name "*.txt" \) -print0 | xargs -0 -r git add

          if git diff --cached --quiet; then
            echo "没有 .mrs 或 .txt 规则变化，不需要提交。"
            exit 0
          fi

          git commit -m "chore: update mihomo rules"
          git push
